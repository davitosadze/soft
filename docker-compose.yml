version: "3.8"
services:
    # PHP Application
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: soft-app
        container_name: soft_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        networks:
            - laravel

    # Nginx Service
    nginx:
        image: nginx:alpine
        container_name: soft_nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - .:/var/www
            - ./docker-compose/nginx:/etc/nginx/conf.d/
        networks:
            - laravel

    # MySQL Service
    db:
        image: mysql:8.0
        container_name: db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: soft_db
            MYSQL_ROOT_PASSWORD: root # This is the only one you strictly need for root access
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - laravel

    # phpMyAdmin Service
    phpmyadmin:
        image: phpmyadmin:latest
        container_name: soft_phpmyadmin
        restart: unless-stopped
        ports:
            - "8080:80"
        environment:
            - PMA_ARBITRARY=1
            - PMA_HOST=db
        networks:
            - laravel

networks:
    laravel:
        driver: bridge

volumes:
    dbdata:
        driver: local
